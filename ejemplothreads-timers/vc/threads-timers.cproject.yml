project:
  packs:
    - pack: ARM::CMSIS@6.3.0
    - pack: Keil::STM32F4xx_DFP@2.17.1
    - pack: ARM::CMSIS-RTX@5.9.1    
  setups:
    - setup: Options for Target_1
      processor:
        fpu: "off"
      debug: "on"
      define:
        - HSE_VALUE: "8000000"
      misc:
        - C:
            - -std=c11
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            #- -fshort-enums
            #- -fshort-wchar
            - -ffunction-sections
            - -Wno-packed
            - -Wno-missing-variable-declarations
            - -Wno-missing-prototypes
            - -Wno-missing-noreturn
            - -Wno-sign-conversion
            - -Wno-nonportable-include-path
            - -Wno-reserved-id-macro
            - -Wno-unused-macros
            - -Wno-documentation-unknown-command
            - -Wno-documentation
            - -Wno-license-management
            - -Wno-parentheses-equality
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --map
            - --load_addr_map_info
            - --xref
            - --callgraph
            - --symbols
            - --info sizes
            - --info totals
            - --info unused
            - --info veneers
            - --strict
            - --summary_stderr
            - --info summarysizes
  linker:
    - script: threads-timers_Target_1.sct
  groups:
    - group: Source Group 1
      files:
        - file: ../src/main.c
        - file: ../src/Timer.c
  components:
    - component: ARM::CMSIS:CORE
    - component: ARM::CMSIS:RTOS2:Keil RTX5&Library
    - component: Keil::Device:STM32Cube Framework:Classic
    - component: Keil::Device:STM32Cube HAL:Common
    - component: Keil::Device:STM32Cube HAL:Cortex
    - component: Keil::Device:STM32Cube HAL:DMA
    - component: Keil::Device:STM32Cube HAL:GPIO
    - component: Keil::Device:STM32Cube HAL:PWR
    - component: Keil::Device:STM32Cube HAL:RCC
    - component: Keil::Device:Startup
    - component: CMSIS:OS Tick:SysTick
